<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>my job</title>
		<link rel="stylesheet" href="/style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Ubuntu+Sans:ital,wght@0,100..800;1,100..800&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
	</head>
	<body>
		<div class="container">
            <div class="zapros_section">
                <div class="zapros_block">
                    <div class="zapros_img">
                        <img src="/img/kaspi.png" alt="">
                    </div>
                    <div class="zapros_item"> 
                        <div class="zapros_title">Оставьте запрос</div>               
                        <div class="form">
                            <input id="numOne" placeholder="Сумма кредита" type="number">
                            <input id="numTwo" placeholder="Срок кредита (в месяцах)" type="number">
                            <input id="numThree" placeholder="Процентная ставка (годовая, %) " type="number">
                        </div>
                        <div class="zapros_btn">
                            <button id="btn">Рассчитать</button>
                        </div>
                        <div class="result">
                            <div>
                                <p>Ежемесж. расчет</p> 
                                <span id="result-pay"></span>
                            </div>
                            <div>
                                <p>Общая сумма выплат</p> 
                                <span id="result-pay-two"></span>
                            </div>
                            <div>
                                <p>Переплата (общая сумма выплат - тело кредита)</p> 
                                <span id="result-pay-three"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
		<script src="js.js"></script>
	</body>
</html>
